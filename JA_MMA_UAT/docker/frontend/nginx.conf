events {}

http {
    server {
        listen 8080;   # ← Change from 80 to 8080

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }

        # Optional: error pages, logging, etc.
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}