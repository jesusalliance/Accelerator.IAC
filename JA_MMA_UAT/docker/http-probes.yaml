template:
  containers:
    - name: frontend-dev
      image: jamacrs20260224.azurecr.io/ja-mma-frontend:dev
      probes:
        - type: Startup
          httpGet:
            path: /
            port: 80
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
          timeoutSeconds: 5
          successThreshold: 1
        - type: Liveness
          httpGet:
            path: /
            port: 80
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 5
        - type: Readiness
          httpGet:
            path: /
            port: 80
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 5
