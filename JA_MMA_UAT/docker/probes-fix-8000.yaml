template:
  containers:
    - name: backend-dev
      image: jamacrs20260224.azurecr.io/test-tools:test-tools
      probes:
        - type: Startup
          tcpSocket:
            port: 8000
          initialDelaySeconds: 60     # Max allowed – gives ~60s before first probe
          periodSeconds: 10
          failureThreshold: 30        # ~5 minutes total grace time
          timeoutSeconds: 5
          successThreshold: 1
        - type: Liveness
          tcpSocket:
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 5
        - type: Readiness
          tcpSocket:
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 5